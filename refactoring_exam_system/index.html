<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>refactoring_exam_system</title>
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('quizhub-theme')
          if (stored) {
            var mode = JSON.parse(stored).state && JSON.parse(stored).state.mode
            if (mode === 'dark') document.documentElement.classList.add('dark')
          }
        } catch (e) {}

        try {
          var languageStored = localStorage.getItem('quizhub-language')
          var language = 'ar'
          if (languageStored) {
            var parsedLanguage = JSON.parse(languageStored).state && JSON.parse(languageStored).state.language
            if (parsedLanguage === 'en') language = 'en'
          }
          document.documentElement.lang = language
          document.documentElement.dir = language === 'en' ? 'ltr' : 'rtl'
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
